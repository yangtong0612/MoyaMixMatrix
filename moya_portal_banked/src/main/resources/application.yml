spring:
  config:
    import:
      - optional:file:./.env[.properties]
  application:
    name: moya-portal-banked
  datasource:
    url: ${MOYA_DB_URL:jdbc:postgresql://localhost:5432/moya_mix_matrix}
    username: ${MOYA_DB_USERNAME:postgres}
    password: ${MOYA_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${MOYA_REDIS_HOST:localhost}
      port: ${MOYA_REDIS_PORT:6379}

server:
  port: ${MOYA_SERVER_PORT:8080}

moya:
  database:
    enabled: ${MOYA_DATABASE_ENABLED:true}
  auth:
    jwt:
      issuer: ${MOYA_JWT_ISSUER:moya-portal-banked}
      secret: ${MOYA_JWT_SECRET:change-me-change-me-change-me-change-me}
      ttl: ${MOYA_JWT_TTL:PT2H}
  drive:
    default-quota-bytes: ${MOYA_DRIVE_DEFAULT_QUOTA_BYTES:10737418240}
  verification:
    ttl: ${MOYA_VERIFICATION_TTL:PT5M}
    send-cooldown: ${MOYA_VERIFICATION_SEND_COOLDOWN:PT1M}
    max-check-attempts: ${MOYA_VERIFICATION_MAX_CHECK_ATTEMPTS:5}
  aliyun:
    ice:
      enabled: ${MOYA_ALIYUN_ICE_ENABLED:false}
      endpoint: ${MOYA_ALIYUN_ICE_ENDPOINT:ice.cn-beijing.aliyuncs.com}
      access-key-id: ${MOYA_ALIYUN_ACCESS_KEY_ID:${MOYA_OSS_ACCESS_KEY_ID:}}
      access-key-secret: ${MOYA_ALIYUN_ACCESS_KEY_SECRET:${MOYA_OSS_ACCESS_KEY_SECRET:}}
  volcengine:
    video:
      enabled: ${MOYA_VOLCENGINE_VIDEO_ENABLED:false}
      base-url: ${MOYA_VOLCENGINE_VIDEO_BASE_URL:https://ark.cn-beijing.volces.com}
      api-key: ${MOYA_VOLCENGINE_ARK_API_KEY:${ARK_API_KEY:}}
      model: ${MOYA_VOLCENGINE_VIDEO_MODEL:doubao-seedance-1-5-pro-251215}
  storage:
    oss:
      enabled: ${MOYA_OSS_ENABLED:false}
      endpoint: ${MOYA_OSS_ENDPOINT:}
      bucket: ${MOYA_OSS_BUCKET:moya-mix-matrix}
      access-key-id: ${MOYA_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${MOYA_OSS_ACCESS_KEY_SECRET:}
      root-prefix: ${MOYA_OSS_ROOT_PREFIX:moya-drive}
      output-prefix: ${MOYA_OSS_OUTPUT_PREFIX:moya-drive/fission/outputs}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
