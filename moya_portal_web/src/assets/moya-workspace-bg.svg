<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Moya workspace background">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c111b"/>
      <stop offset="0.38" stop-color="#121827"/>
      <stop offset="0.72" stop-color="#10151a"/>
      <stop offset="1" stop-color="#17120f"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
